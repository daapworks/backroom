<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Head Lasers Scroll Scene</title>
  <link rel="stylesheet" href="https://use.typekit.net/rsd6dgx.css">
  <style>
    #introReference {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 5;
      opacity: 0.50;
      pointer-events: none;
      mix-blend-mode: normal;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0b0b0f;
      color: white;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #intro {
      position: fixed;
      inset: 0;
      z-index: 300;
      overflow: hidden;
      background: black;
    }

    #introBase,
    #introGlitch,
    #introFace {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #introBase,
    #introGlitch {
      object-fit: cover;
      object-position: center center;
    }

    #introBase {
      z-index: 1;
      opacity: 1;
    }

    #introGlitch {
      z-index: 4;
      opacity: 0;
      mix-blend-mode: normal;
    }

    #intro {
      --face-x: -175px;
      --face-y: -58px;
      --face-size: 781px;
      --face-slide-left: 120px;
      --face-slide-up: 30px;
    }

    #introFace {
      z-index: 2;
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--face-size);
      height: auto;
      object-fit: contain;
      object-position: center center;
      opacity: 1;

      transform:
        translate(-50%, -50%) translate(var(--face-x), var(--face-y));

      transform-origin: center center;
      transition: transform 900ms cubic-bezier(0.16, 1, 0.3, 1);

    }

    #intro.separate #introFace {
      transform:
        translate(-50%, -50%) translate(calc(var(--face-x) - var(--face-slide-left)),
          calc(var(--face-y) - var(--face-slide-up)));
    }

    #intro.glitching #introGlitch {
      animation:
        introGlitchFlash 1.5s steps(1, end),
        introGlitchSlices 1.5s steps(2, end);
    }

    #intro.hide {
      opacity: 0;
      transition: opacity 400ms ease;
      pointer-events: none;
    }

    #introGlitch::before,
    #introGlitch::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: inherit;
      background-size: cover;
      background-position: center;
      pointer-events: none;
      opacity: 0;
    }

    #intro.glitching #introGlitch::before {
      opacity: 0.75;
      transform: translate(14px, 0);
      filter: drop-shadow(-14px 0 0 red);
    }

    #intro.glitching #introGlitch::after {
      opacity: 0.75;
      transform: translate(-14px, 0);
      filter: drop-shadow(14px 0 0 cyan);
    }

    @keyframes introGlitchFlash {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(1);
      }

      6% {
        opacity: 1;
        transform: translate(-20px, 6px) scale(1.01);
      }

      16% {
        opacity: 0.9;
        transform: translate(12px, -4px) scale(1.02);
      }

      24% {
        opacity: 0;
        transform: translate(0, 0) scale(1);
      }

      30% {
        opacity: 1;
        transform: translate(18px, -8px) scale(1.01);
      }

      42% {
        opacity: 0.95;
        transform: translate(-10px, 3px) scale(1.03);
      }

      50% {
        opacity: 0;
        transform: translate(0, 0) scale(1);
      }

      58% {
        opacity: 1;
        transform: translate(-24px, 7px) scale(1.02);
      }

      72% {
        opacity: 0.9;
        transform: translate(14px, -5px) scale(1.01);
      }

      82% {
        opacity: 0;
        transform: translate(0, 0) scale(1);
      }

      88% {
        opacity: 0.8;
        transform: translate(8px, -2px) scale(1.01);
      }

      100% {
        opacity: 0;
        transform: translate(0, 0) scale(1);
      }
    }

    @keyframes introGlitchSlices {
      0% {
        clip-path: inset(0 0 0 0);
      }

      20% {
        clip-path: inset(4% 0 8% 0);
      }

      40% {
        clip-path: inset(12% 0 6% 0);
      }

      60% {
        clip-path: inset(6% 0 14% 0);
      }

      80% {
        clip-path: inset(10% 0 5% 0);
      }

      100% {
        clip-path: inset(0 0 0 0);
      }
    }

    #introText {
      position: absolute;
      width: 25%;
      left: 61%;
      bottom: 10%;
      z-index: 3;
    }

    #introButton {
      position: absolute;
      left: 61%;
      bottom: 5%;
      width: auto;
      height: 5%;
      z-index: 3;
    }

    #scroll {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #world {
      position: relative;
      height: 9500px;
      width: 100%;
    }

    .stars {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, .12), transparent 35%),
        radial-gradient(circle at 60% 70%, rgba(255, 255, 255, .10), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, .08), transparent 35%);
      filter: blur(0.2px);
      opacity: 0.8;
      pointer-events: none;
    }

    #head {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: auto;
      user-select: none;
      pointer-events: none;
      will-change: transform;
      filter: drop-shadow(0 14px 30px rgba(0, 0, 0, 0.55));
      z-index: 30;
      opacity: 0;
    }

    #targetWrap {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      gap: 12px;
      opacity: 0;
      transition: opacity 300ms ease;
      z-index: 20;
    }

    #targetWrap.show {
      opacity: 1;
    }

    #target {
      width: 240px;
      height: auto;
      filter: drop-shadow(0 12px 30px rgba(0, 0, 0, 0.6));
      display: block;
    }

    .laser {
      position: fixed;
      height: 8px;
      background: linear-gradient(90deg,
          rgba(255, 255, 255, 1) 0%,
          rgba(255, 120, 120, 0.95) 15%,
          rgba(255, 0, 70, 0.95) 75%,
          rgba(255, 0, 70, 0.15) 100%);
      border-radius: 999px;
      box-shadow:
        0 0 8px rgba(255, 0, 70, 0.9),
        0 0 18px rgba(255, 0, 70, 0.75),
        0 0 30px rgba(255, 255, 255, 0.4);
      transform-origin: 0 50%;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      transition: opacity 80ms linear;
    }

    .laser.on {
      opacity: 1;
    }

    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 60;
    }

    .spark {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      background: white;
      box-shadow:
        0 0 6px rgba(255, 255, 255, 0.95),
        0 0 14px rgba(255, 120, 80, 0.85),
        0 0 24px rgba(255, 60, 0, 0.65);
      will-change: transform, opacity;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    #instructionText.show {
      opacity: 1;
    }

    #instructionText2.show {
      opacity: 1;
    }

    #levelLabel,
    #timer {
      position: absolute;
      top: 18px;
      color: white;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.25),
        0 0 20px rgba(255, 255, 255, 0.12);
      font-size: 24px;
      font-variant-numeric: tabular-nums;
      font-family: "widescreen-mixed", sans-serif;
    }

    #levelLabel {
      left: 40%;
      width: 20%;
      text-align: center;
    }

    #timer {
      right: 20px;
    }

    #instructionText {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      font-family: 'widescreen-mixed', sans-serif;
      font-size: 18px;
      letter-spacing: 0.5px;
      color: white;
      opacity: 0;

      transition: opacity 250ms ease;
      pointer-events: none;

      width: 100%;
      text-align: center;
    }

    #instructionText2 {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      font-family: 'widescreen-mixed', sans-serif;
      font-size: 18px;
      letter-spacing: 0.5px;
      color: white;
      opacity: 0;

      transition: opacity 250ms ease;
      pointer-events: none;

      width: 100%;
      text-align: center;
    }

    #hitFlash {
      position: fixed;
      inset: 0;
      z-index: 110;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
    }

    #hitFlash.show {
      opacity: 1;
    }

    #hitFlashImg {
      max-width: min(80vw, 900px);
      max-height: 80vh;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.35));
    }

    #hitOverlay {
      position: fixed;
      inset: 0;
      z-index: 120;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
      background: black;
    }

    #hitOverlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    #hitOverlayImg,
    #hitOverlay::before,
    #hitOverlay::after {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #hitOverlayImg {
      object-fit: contain;
      object-position: center bottom;
      display: block;
      transform: none;
    }

    #hitOverlay::before,
    #hitOverlay::after {
      content: "";
      background-image: var(--overlay-img);
      background-size: contain;
      background-position: center bottom;
      background-repeat: no-repeat;
      mix-blend-mode: screen;
      opacity: 0;
      pointer-events: none;
    }

    #hitOverlay.glitching #hitOverlayImg {
      animation:
        overlayFlicker 700ms steps(2, end),
        overlayShake 700ms steps(2, end);
    }

    #hitOverlay.glitching::before {
      transform: translate(8px, 0);
      filter: drop-shadow(-8px 0 0 red);
      opacity: 0.45;
      animation: glitchSliceA 700ms steps(2, end);
    }

    #hitOverlay.glitching::after {
      transform: translate(-8px, 0);
      filter: drop-shadow(8px 0 0 cyan);
      opacity: 0;
      animation: glitchSliceB 700ms steps(2, end);
    }

    #hitOverlay.glitch-out #hitOverlayImg {
      animation:
        overlayOutFlicker 500ms steps(2, end),
        overlayOutShake 500ms steps(2, end);
    }

    #hitOverlay.glitch-out::before {
      transform: translate(12px, 0);
      filter: drop-shadow(-12px 0 0 red);
      opacity: 0.45;
      animation: glitchOutSliceA 500ms steps(2, end);
    }

    #hitOverlay.glitch-out::after {
      transform: translate(-12px, 0);
      filter: drop-shadow(12px 0 0 cyan);
      opacity: 0.45;
      animation: glitchOutSliceB 500ms steps(2, end);
    }

    @keyframes overlayOutFlicker {
      0% {
        opacity: 1;
      }

      20% {
        opacity: 0.35;
      }

      35% {
        opacity: 1;
      }

      55% {
        opacity: 0.15;
      }

      75% {
        opacity: 0.8;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes overlayOutShake {
      0% {
        transform: translate(0, 0);
      }

      20% {
        transform: translate(10px, -2px);
      }

      40% {
        transform: translate(-12px, 3px);
      }

      60% {
        transform: translate(8px, -1px);
      }

      80% {
        transform: translate(-6px, 2px);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    @keyframes glitchOutSliceA {
      0% {
        opacity: 0.4;
        clip-path: inset(8% 0 72% 0);
      }

      30% {
        opacity: 0.45;
        clip-path: inset(42% 0 32% 0);
      }

      60% {
        opacity: 0.35;
        clip-path: inset(70% 0 10% 0);
      }

      100% {
        opacity: 0;
        clip-path: inset(0 0 100% 0);
      }
    }

    @keyframes glitchOutSliceB {
      0% {
        opacity: 0.35;
        clip-path: inset(5% 0 82% 0);
      }

      30% {
        opacity: 0.45;
        clip-path: inset(28% 0 46% 0);
      }

      60% {
        opacity: 0.3;
        clip-path: inset(66% 0 16% 0);
      }

      100% {
        opacity: 0;
        clip-path: inset(0 0 100% 0);
      }
    }

    @keyframes overlayFlicker {
      0% {
        opacity: 0;
      }

      8% {
        opacity: 1;
      }

      12% {
        opacity: 0.15;
      }

      18% {
        opacity: 1;
      }

      26% {
        opacity: 0.65;
      }

      34% {
        opacity: 1;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes overlayShake {
      0% {
        transform: translate(0, 0);
      }

      20% {
        transform: translate(-10px, 2px);
      }

      40% {
        transform: translate(8px, -2px);
      }

      60% {
        transform: translate(-6px, 1px);
      }

      80% {
        transform: translate(4px, -1px);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    @keyframes glitchSliceA {
      0% {
        opacity: 0;
        clip-path: inset(0 0 100% 0);
      }

      20% {
        opacity: 0.5;
        clip-path: inset(10% 0 70% 0);
      }

      40% {
        opacity: 0.25;
        clip-path: inset(45% 0 35% 0);
      }

      60% {
        opacity: 0.45;
        clip-path: inset(75% 0 8% 0);
      }

      100% {
        opacity: 0;
        clip-path: inset(0 0 100% 0);
      }
    }

    @keyframes glitchSliceB {
      0% {
        opacity: 0;
        clip-path: inset(0 0 100% 0);
      }

      15% {
        opacity: 0.35;
        clip-path: inset(5% 0 82% 0);
      }

      35% {
        opacity: 0.45;
        clip-path: inset(30% 0 45% 0);
      }

      65% {
        opacity: 0.3;
        clip-path: inset(68% 0 18% 0);
      }

      100% {
        opacity: 0;
        clip-path: inset(0 0 100% 0);
      }
    }

    #nextLevelBtn {
      position: absolute;
      right: 10%;
      bottom: 40px;
      z-index: 130;

      display: inline-flex;
      align-items: center;
      gap: 10px;

      border: 1px solid #01FF06;
      border-radius: 14px;
      padding: 14px 22px;

      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;

      background: rgba(255, 255, 255, 0.14);
      color: white;

      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);

      cursor: pointer;

      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease, background 180ms ease;

      font-family: "IBM Plex Mono", monospace;
    }

    #nextLevelBtn.show {
      opacity: 1;
      pointer-events: auto;
    }

    #nextLevelBtn:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    /* RED ARROW */
    #nextLevelBtn .arrow {
      color: #ff2a2a;
      font-size: 20px;
      line-height: 1;
    }

    /* Optional: subtle bounce animation */
    #nextLevelBtn .arrow {
      animation: arrowBounce 1s infinite;
    }

    @keyframes arrowBounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(4px);
      }
    }

    #overlayNoise {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg,
          rgba(255, 255, 255, 0.02) 0px,
          rgba(255, 255, 255, 0.02) 1px,
          transparent 1px,
          transparent 3px),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05), transparent 70%);
      opacity: 0.25;
      pointer-events: none;
      animation: noiseFlicker 120ms infinite;
    }

    @keyframes noiseFlicker {
      0% {
        opacity: 0.2;
      }

      50% {
        opacity: 0.28;
      }

      100% {
        opacity: 0.2;
      }
    }

    #status {
      position: fixed;
      left: 12px;
      bottom: 10px;
      font-size: 12px;
      opacity: 0.6;
      user-select: none;
      pointer-events: none;
      z-index: 210;
      display: none;
    }

    .eye-flash {
      position: fixed;
      width: 18px;
      height: 18px;
      margin-left: -9px;
      margin-top: -9px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 1) 0%, rgba(255, 80, 80, 0.9) 35%, rgba(255, 0, 70, 0) 70%);
      pointer-events: none;
      z-index: 55;
      opacity: 0;
    }

    #endSequenceScreen {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, 0.92);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    #endSequenceScreen.show {
      opacity: 1;
      pointer-events: auto;
    }

    .endSeqImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-position: center center;
      opacity: 0;
      pointer-events: none;
    }

    #endSeqImg1 {
      width: auto;
      height: auto;
      max-width: min(80vw, 900px);
      max-height: 80vh;
      object-fit: contain;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #endSeqImg2 {
      object-fit: cover;
    }

    #endSeqImg3 {
      object-fit: cover;
    }

    #endSeqFinal {
      object-fit: cover;
      object-position: center center;
    }

    .endSeqImg.show {
      opacity: 1;
    }

    #endSeqEdgeGlitch {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: 0;
      pointer-events: none;
      z-index: 3;
    }

    #endSeqEdgeGlitch.show {
      opacity: 0.55;
      animation: edgeGlitchFlicker 180ms steps(2, end) infinite;
    }

    #endSeqText {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      bottom: 18%;
      z-index: 2;
      opacity: 0;
      transition: opacity 220ms ease;
    }

    #endSeqText.show {
      opacity: 1;
    }

    #textImage {
      width: 30%;
    }

    #endSeqButtons {
      position: absolute;
      left: 42%;
      bottom: 20%;
      transform: translateX(-50%);
      display: flex;
      gap: 110%;
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    #endSeqButtons.show {
      opacity: 1;
      pointer-events: auto;
    }

    #endSeqButtons a {
      display: block;
    }

    #endSeqButtons img {
      display: block;
      max-width: 240px;
      height: auto;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    #endSeqButtons img:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    @keyframes edgeGlitchFlicker {
      0% {
        opacity: 0.42;
        transform: translate(0, 0);
      }

      20% {
        opacity: 0.58;
        transform: translate(-2px, 0);
      }

      40% {
        opacity: 0.48;
        transform: translate(2px, 0);
      }

      60% {
        opacity: 0.62;
        transform: translate(-1px, 1px);
      }

      80% {
        opacity: 0.5;
        transform: translate(1px, -1px);
      }

      100% {
        opacity: 0.55;
        transform: translate(0, 0);
      }
    }

    #endSeqImg2.glitch-in {
      opacity: 1;
      animation:
        endSeqGlitchInFlicker 500ms steps(2, end),
        endSeqGlitchInShake 500ms steps(2, end);
    }

    #endSeqImg2.glitch-out {
      opacity: 1;
      animation:
        endSeqGlitchOutFlicker 500ms steps(2, end),
        endSeqGlitchOutShake 500ms steps(2, end);
    }

    /* IN */
    @keyframes endSeqGlitchInFlicker {
      0% {
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      20% {
        opacity: 0.2;
      }

      30% {
        opacity: 1;
      }

      45% {
        opacity: 0.4;
      }

      60% {
        opacity: 1;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes endSeqGlitchInShake {
      0% {
        transform: translate(0, 0);
      }

      20% {
        transform: translate(-12px, 2px);
      }

      40% {
        transform: translate(10px, -2px);
      }

      60% {
        transform: translate(-6px, 1px);
      }

      80% {
        transform: translate(4px, -1px);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    /* OUT */
    @keyframes endSeqGlitchOutFlicker {
      0% {
        opacity: 1;
      }

      20% {
        opacity: 0.35;
      }

      35% {
        opacity: 1;
      }

      55% {
        opacity: 0.15;
      }

      75% {
        opacity: 0.8;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes endSeqGlitchOutShake {
      0% {
        transform: translate(0, 0);
      }

      20% {
        transform: translate(12px, -2px);
      }

      40% {
        transform: translate(-10px, 3px);
      }

      60% {
        transform: translate(8px, -1px);
      }

      80% {
        transform: translate(-6px, 2px);
      }

      100% {
        transform: translate(0, 0);
      }
    }
  </style>
</head>

<body>
  <div id="intro">

    //hitFlashImg.src = HIT_FLASH_SRC;

    let introFinished = false;
    let gameplayEnabled = false;
    let waitingForIntroScroll = false;

    let scrollY = 0;
    let autoScrolling = false;
    let scrollStarted = false;

    let cursorX = window.innerWidth / 2;
    let cursorY = window.innerHeight / 2;
    let headX = window.innerWidth / 2;
    let headY = window.innerHeight / 2;

    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;
    let targetVX = 120;
    let targetVY = 90;
    let targetContactWarned = false;
    let targetContactActive = false;

    let lastTime = performance.now();

    let currentLevel = 0;
    let timeRemaining = LEVEL_DURATION;
    let timerStarted = false;
    let levelEnded = false;
    let targetDestroyed = false;
    let hitSequenceRunning = false;
    let gameWon = false;
    let gracePeriodActive = false;
    let graceEndTime = 0;

    let shotStep = 0;
    const SHOT_ANGLES = [0, 45, 90, 135, 180, 225, 270, 315];

    let gameOver = false;

    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    function formatTime(seconds) {
      const clamped = Math.max(0, seconds);
      const mins = Math.floor(clamped / 60);
      const secs = Math.floor(clamped % 60);
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function runIntroSequence() {
      await wait(250);

      // glitch the full composition
      intro.classList.add("glitching");
      await wait(1500);
      intro.classList.remove("glitching");

      // short clean hold
      await wait(600);

      // separate the face slab
      intro.classList.add("separate");
      await wait(750);

      // STOP HERE and wait for user scroll on landing page
      waitingForIntroScroll = true;

      timerEl.style.opacity = "0.5";
      levelLabel.textContent = "SCROLL TO BEGIN";
    }

    async function finishIntroAndStartGame() {
      if (!waitingForIntroScroll || introFinished) return;

      waitingForIntroScroll = false;

      // move gameplay head to where the intro face ended up
      const faceRect = introFace.getBoundingClientRect();
      const headRect = head.getBoundingClientRect();

      headX = faceRect.left + faceRect.width / 2;
      headY = faceRect.top + faceRect.height / 2;

      head.style.left = `${headX - headRect.width / 2}px`;
      head.style.top = `${headY - headRect.height / 2}px`;
      head.style.opacity = "1";

      // hide intro / landing page
      intro.classList.add("hide");
      await wait(400);

      intro.style.display = "none";
      introFinished = true;

      // now enter gameplay
      autoScrolling = true;
      scrollStarted = true;
      timerStarted = true;
      gameplayEnabled = true;

      timerEl.style.opacity = "1";
      levelLabel.textContent = LEVELS[currentLevel].label;
    }

    async function loadLevel(index) {
      const level = LEVELS[index];


      levelLabel.textContent = level.label;

      // Hide target immediately while swapping assets
      targetWrap.classList.remove("show");
      target.style.opacity = "0";

      targetDestroyed = false;
      hitSequenceRunning = false;
      levelEnded = false;
      targetContactWarned = false;
      targetContactActive = false;

      nextLevelBtn.classList.remove("show");

      timeRemaining = LEVEL_DURATION;
      timerEl.textContent = formatTime(timeRemaining);
      timerEl.style.color = "white";
      timerEl.style.opacity = "1";

      targetX = window.innerWidth / 2;
      targetY = window.innerHeight / 2;
      targetVX = 120;
      targetVY = 90;
      targetWrap.style.left = `${targetX}px`;
      targetWrap.style.top = `${targetY}px`;

      // Apply target size for this level
      target.style.width = level.size;

      // Preload and swap the live target image cleanly
      const liveImg = new Image();
      liveImg.src = level.targetSrc;
      await liveImg.decode().catch(() => { });

      target.src = level.targetSrc;

      // Update overlay image too
      const overlayImg = new Image();
      overlayImg.src = level.overlaySrc;
      await overlayImg.decode().catch(() => { });

      hitOverlayImg.src = level.overlaySrc;
      hitOverlay.style.setProperty("--overlay-img", `url("${level.overlaySrc}")`);

      // Make target drawable again
      target.style.opacity = "1";
    }

    function showTooCloseWarning() {
      instructionText2.classList.remove("show");

      instructionText.textContent = "YOU GOT TOO CLOSE TO YOUR TARGET. THEY MIGHT START TO SUSPECT YOU";
      instructionText.classList.add("show");

      clearTimeout(warningTimeout);
      warningTimeout = setTimeout(() => {
        instructionText.classList.remove("show");
      }, 3500);
    }

    function showFinalOverlay() {
      hitOverlay.classList.remove("glitch-out");
      hitOverlay.classList.add("show");
      hitOverlay.classList.remove("glitching");
      void hitOverlay.offsetWidth;
      hitOverlay.classList.add("glitching");
    }

    async function runHitSequence(impactX, impactY) {
      if (hitSequenceRunning) return;

      hitSequenceRunning = true;
      targetDestroyed = true;
      levelEnded = true;
      autoScrolling = false;
      timerEl.style.color = "#00ffcc";

      spawnImpactSparks(impactX, impactY);
      target.src = LEVELS[currentLevel].deadSrc;

      for (let i = 0; i < 3; i++) {
        hitFlash.classList.add("show");
        await wait(320);
        hitFlash.classList.remove("show");
        await wait(180);
      }

      showFinalOverlay();
      await wait(700);

      // if (currentLevel < LEVELS.length - 1) {
      nextLevelBtn.classList.add("show");
      // }
      // } else {
      //   await triggerWin();
      // }
    }

    window.addEventListener("pointermove", (e) => {
      cursorX = e.clientX;
      cursorY = e.clientY;

      if (!introFinished) return;
    });


    nextLevelBtn.addEventListener("click", async () => {
      if (currentLevel >= LEVELS.length - 1) {
        await triggerWin();
        //await hideOverlayWithGlitch();
        return;
      }

      await hideOverlayWithGlitch();

      currentLevel += 1;
      await loadLevel(currentLevel);

      autoScrolling = true;
      timerStarted = true;
    });
    let touchStartY = 0;

    window.addEventListener("touchstart", (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener("touchmove", (e) => {
      const dy = Math.abs(e.touches[0].clientY - touchStartY);
      if (dy > 10) {
        startGameplay();
      }
    }, { passive: true });

    window.addEventListener("wheel", (e) => {
      if (Math.abs(e.deltaY) <= 2) return;

      if (waitingForIntroScroll && !introFinished) {
        finishIntroAndStartGame();
        return;
      }

      if (!scrollStarted && introFinished) {
        autoScrolling = true;
        scrollStarted = true;
        timerStarted = true;
        gameplayEnabled = true;
      }
    }, { passive: true });

    function startGameplay() {
      if (scrollStarted || !introFinished) return;

      autoScrolling = true;
      scrollStarted = true;
      timerStarted = true;
      gameplayEnabled = true;
    }

    function tick(now) {
      const delta = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;

      if (gracePeriodActive && now >= graceEndTime) {
        gracePeriodActive = false;
      }

      if (timerStarted && !levelEnded && !gameWon) {
        timeRemaining -= delta;

        if (timeRemaining <= 0) {
          timeRemaining = 0;
          triggerGameOver();
        }

        timerEl.textContent = formatTime(timeRemaining);
        timerEl.style.color = timeRemaining <= 10 ? "#ff5c5c" : "white";
      }

      if (autoScrolling) {
        scrollY += AUTO_SCROLL_SPEED * delta;
      }

      world.style.transform = `translateY(${-scrollY}px)`;

      if (!gameWon &&
        scrollY >= LEVELS[currentLevel].revealY &&
        !targetDestroyed &&
        !hitSequenceRunning && !targetWrap.classList.contains("show")) {
        targetWrap.classList.add("show");

        // show instructions
        instructionText.textContent = "MOVE WITH MOUSE • PRESS SPACE TO FIRE";
        instructionText.classList.add("show");

        setTimeout(() => {
          instructionText.classList.remove("show");
          instructionText2.textContent = "DON'T GET TOO CLOSE";
          instructionText2.classList.add("show");
        }, 2000);


        setTimeout(() => {
          instructionText2.classList.remove("show");
        }, 2000);

        // start grace period (2 seconds)
        gracePeriodActive = true;
        graceEndTime = performance.now() + 2000;
      }

      if (gameplayEnabled) {
        const followSpeed = 8;
        headX += (cursorX - headX) * followSpeed * delta;
        headY += (cursorY - headY) * followSpeed * delta;
      }

      const headRect = head.getBoundingClientRect();
      const padX = headRect.width / 2;
      const padY = headRect.height / 2;

      headX = clamp(headX, padX, window.innerWidth - padX);
      headY = clamp(headY, padY, window.innerHeight - padY);

      head.style.left = `${headX - padX}px`;
      head.style.top = `${headY - padY}px`;

      if (targetWrap.classList.contains("show") && !targetDestroyed && !hitSequenceRunning) {
        const rect = targetWrap.getBoundingClientRect();
        const halfW = rect.width / 2;
        const halfH = rect.height / 2;

        targetX += targetVX * delta;
        targetY += targetVY * delta;

        if (targetX < halfW) {
          targetX = halfW;
          targetVX *= -1;
        } else if (targetX > window.innerWidth - halfW) {
          targetX = window.innerWidth - halfW;
          targetVX *= -1;
        }

        if (targetY < halfH) {
          targetY = halfH;
          targetVY *= -1;
        } else if (targetY > window.innerHeight - halfH) {
          targetY = window.innerHeight - halfH;
          targetVY *= -1;
        }

        targetVX += (Math.random() - 0.5) * 20 * delta;
        targetVY += (Math.random() - 0.5) * 20 * delta;

        const TARGET_MAX_SPEED = 180;
        targetVX = Math.max(-TARGET_MAX_SPEED, Math.min(TARGET_MAX_SPEED, targetVX));
        targetVY = Math.max(-TARGET_MAX_SPEED, Math.min(TARGET_MAX_SPEED, targetVY));

        targetWrap.style.left = `${targetX}px`;
        targetWrap.style.top = `${targetY}px`;
      }

      if (
        gameplayEnabled &&
        !gameOver &&
        targetWrap.classList.contains("show") &&
        !targetDestroyed &&
        !hitSequenceRunning
      ) {
        const headRect = head.getBoundingClientRect();
        const targetRect = targetWrap.getBoundingClientRect();

        const touchingTarget = !gracePeriodActive && rectsOverlap(headRect, targetRect);

        if (touchingTarget && !targetContactActive) {
          targetContactActive = true;

          if (!targetContactWarned) {
            targetContactWarned = true;
            showTooCloseWarning();
          } else {
            triggerGameOver();
          }
        }

        if (!touchingTarget) {
          targetContactActive = false;
        }
      }

      requestAnimationFrame(tick);
    }

    function showEyeFlash(el, x, y) {
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.style.opacity = "1";
      setTimeout(() => {
        el.style.opacity = "0";
      }, 120);
    }

    function fireLasers() {
      if (gameOver) return;
      if (levelEnded) return;
      if (!targetWrap.classList.contains("show")) return;
      if (targetDestroyed || hitSequenceRunning) return;

      const headRect = head.getBoundingClientRect();
      const eyeLY = headRect.top + headRect.height * 0.39;
      const eyeRY = headRect.top + headRect.height * 0.37;
      const eyeLX = headRect.left + headRect.width * 0.34;
      const eyeRX = headRect.left + headRect.width * 0.66;

      showEyeFlash(flashL, eyeLX, eyeLY);
      showEyeFlash(flashR, eyeRX, eyeRY);

      const angleDeg = SHOT_ANGLES[shotStep];
      const angleRad = angleDeg * Math.PI / 180;
      const laserLength = Math.max(window.innerWidth, window.innerHeight) * 1.5;

      const dx = Math.cos(angleRad) * laserLength;
      const dy = -Math.sin(angleRad) * laserLength;

      const aimXLeft = eyeLX + dx;
      const aimYLeft = eyeLY + dy;
      const aimXRight = eyeRX + dx;
      const aimYRight = eyeRY + dy;

      const targetRect = target.getBoundingClientRect();

      animateLaser(laserL, eyeLX, eyeLY, aimXLeft, aimYLeft, targetRect);
      animateLaser(laserR, eyeRX, eyeRY, aimXRight, aimYRight, targetRect);

      const hitPointL = getRayRectHitPoint(eyeLX, eyeLY, aimXLeft, aimYLeft, targetRect);
      const hitPointR = getRayRectHitPoint(eyeRX, eyeRY, aimXRight, aimYRight, targetRect);

      if (hitPointL || hitPointR) {
        const impact = hitPointL || hitPointR;
        setTimeout(() => {
          runHitSequence(impact.x, impact.y);
        }, 220);
      }

      shotStep = (shotStep + 1) % SHOT_ANGLES.length;
    }

    function animateLaser(el, x1, y1, x2, y2, targetRect) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const fullLen = Math.hypot(dx, dy);
      const angle = Math.atan2(dy, dx) * (180 / Math.PI);

      const tHit = rayRectIntersection(x1, y1, x2, y2, targetRect);
      const finalLen = tHit !== null ? fullLen * tHit : fullLen;

      const laserHeight = 8; // keep in sync with CSS
      const pixelsPerSecond = 2200; // lower = slower, more visible travel
      const duration = Math.max(120, (finalLen / pixelsPerSecond) * 1000);

      const start = performance.now();

      el.style.left = `${x1}px`;
      el.style.top = `${y1 - laserHeight / 2}px`;
      el.style.width = `0px`;
      el.style.transform = `rotate(${angle}deg)`;
      el.classList.add("on");

      function frame(now) {
        const t = Math.min((now - start) / duration, 1);

        // linear or slight ease-out both work; linear usually feels better for a beam
        el.style.width = `${finalLen * t}px`;

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          setTimeout(() => {
            el.classList.remove("on");
            el.style.width = `0px`;
          }, 80);
        }
      }

      requestAnimationFrame(frame);
      return tHit !== null;
    }

    function spawnImpactSparks(x, y) {
      const count = 18;

      for (let i = 0; i < count; i++) {
        const spark = document.createElement("div");
        spark.className = "spark";
        particles.appendChild(spark);

        const angle = Math.random() * Math.PI * 2;
        const distance = 30 + Math.random() * 50;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;
        const size = 3 + Math.random() * 5;
        const duration = 250 + Math.random() * 250;

        spark.style.width = `${size}px`;
        spark.style.height = `${size}px`;
        spark.style.left = `${x - size / 2}px`;
        spark.style.top = `${y - size / 2}px`;
        spark.style.opacity = "1";
        spark.style.transform = "translate(0px, 0px) scale(1)";

        spark.animate(
          [
            { transform: "translate(0px, 0px) scale(1)", opacity: 1 },
            { transform: `translate(${dx}px, ${dy}px) scale(0.3)`, opacity: 0 }
          ],
          {
            duration,
            easing: "cubic-bezier(0.2, 0.8, 0.2, 1)",
            fill: "forwards"
          }
        );

        setTimeout(() => spark.remove(), duration);
      }
    }

    function getRayRectHitPoint(x1, y1, x2, y2, rect) {
      const dx = x2 - x1;
      const dy = y2 - y1;

      let bestT = Infinity;
      let hitPoint = null;

      const sides = [
        [rect.left, rect.top, rect.right, rect.top],
        [rect.right, rect.top, rect.right, rect.bottom],
        [rect.right, rect.bottom, rect.left, rect.bottom],
        [rect.left, rect.bottom, rect.left, rect.top],
      ];

      for (const [x3, y3, x4, y4] of sides) {
        const denom = dx * (y4 - y3) - dy * (x4 - x3);
        if (denom === 0) continue;

        const t = ((x3 - x1) * (y4 - y3) - (y3 - y1) * (x4 - x3)) / denom;
        const u = ((x3 - x1) * dy - (y3 - y1) * dx) / denom;

        if (t >= 0 && t <= 1 && u >= 0 && u <= 1 && t < bestT) {
          bestT = t;
          hitPoint = {
            x: x1 + dx * t,
            y: y1 + dy * t
          };
        }
      }

      return hitPoint;
    }

    function rayRectIntersection(x1, y1, x2, y2, rect) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      let tMin = Infinity;

      const sides = [
        [rect.left, rect.top, rect.right, rect.top],
        [rect.right, rect.top, rect.right, rect.bottom],
        [rect.right, rect.bottom, rect.left, rect.bottom],
        [rect.left, rect.bottom, rect.left, rect.top],
      ];

      for (const [x3, y3, x4, y4] of sides) {
        const denom = dx * (y4 - y3) - dy * (x4 - x3);
        if (denom === 0) continue;

        const t = ((x3 - x1) * (y4 - y3) - (y3 - y1) * (x4 - x3)) / denom;
        const u = ((x3 - x1) * dy - (y3 - y1) * dx) / denom;

        if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
          tMin = Math.min(tMin, t);
        }
      }

      return tMin < Infinity ? tMin : null;
    }

    async function hideOverlayWithGlitch() {
      hitOverlay.classList.remove("glitching");
      hitOverlay.classList.add("glitch-out");
      nextLevelBtn.classList.remove("show");

      await wait(500);

      hitOverlay.classList.remove("show", "glitch-out");
    }

    function rectsOverlap(a, b) {
      return !(
        a.right < b.left ||
        a.left > b.right ||
        a.bottom < b.top ||
        a.top > b.bottom
      );
    }

    async function blinkImage(el, times = 3, onMs = 220, offMs = 140) {
      for (let i = 0; i < times; i++) {
        el.classList.add("show");
        await wait(onMs);
        el.classList.remove("show");
        await wait(offMs);
      }
    }

    function clearEndSequenceImages() {
      endSeqImg1.classList.remove("show");
      endSeqImg2.classList.remove("show", "glitch-in", "glitch-out");
      endSeqFinal.classList.remove("show");
      endSeqEdgeGlitch.classList.remove("show");
      endSeqButtons.classList.remove("show");
      endSeqText.classList.remove("show");
    }

    async function runEndSequence(sequence, buttons) {
      const imgs = [sequence.blink1, sequence.blink2, sequence.final, sequence.text].filter(Boolean);

      await Promise.all(
        imgs.map(src => {
          const img = new Image();
          img.src = src;
          return img.decode().catch(() => { });
        })
      );

      endSeqImg1.src = sequence.blink1;
      endSeqImg2.src = sequence.blink2;
      endSeqFinal.src = sequence.final;
      textImage.src = sequence.text;

      clearEndSequenceImages();
      endSequenceScreen.classList.add("show");

      // STEP 1 — blink first image
      await blinkImage(endSeqImg1, 3, 220, 140);
      await wait(120);

      // STEP 2 — win vs lose behavior
      if (sequence === WIN_SEQUENCE) {
        await glitchInImage(endSeqImg2, 500);
        await wait(900); // hold on screen
        await glitchOutImage(endSeqImg2, 500);
      } else {
        await blinkImage(endSeqImg2, 3, 220, 140);
      }

      await wait(120);

      // STEP 3 — final screen
      endSeqFinal.classList.add("show");

      endBtn1Link.href = buttons.button1Href;
      endBtn2Link.href = buttons.button2Href;

      endSeqText.classList.add("show");
      endSeqEdgeGlitch.classList.add("show");
      endSeqButtons.classList.add("show");
    }

    async function glitchInImage(el, duration = 500) {
      el.classList.remove("glitch-out", "show");
      void el.offsetWidth; // force reflow

      el.classList.add("glitch-in");
      await wait(duration);

      el.classList.remove("glitch-in");
      el.classList.add("show");
    }

    async function glitchOutImage(el, duration = 500) {
      el.classList.remove("glitch-in", "show");
      void el.offsetWidth;

      el.classList.add("glitch-out");
      await wait(duration);

      el.classList.remove("glitch-out", "show");
    }

    async function triggerGameOver() {
      if (gameOver) return;

      gameOver = true;
      levelEnded = true;
      autoScrolling = false;
      timerStarted = false;
      gameplayEnabled = false;
      hitSequenceRunning = false;

      targetWrap.classList.remove("show");
      nextLevelBtn.classList.remove("show");
      hitOverlay.classList.remove("show", "glitching", "glitch-out");
      instructionText.classList.remove("show");
      instructionText2.classList.remove("show");

      await runEndSequence(GAME_OVER_SEQUENCE, GAME_OVER_BUTTONS);
    }

    async function triggerWin() {
      if (gameWon) return;

      gameWon = true;
      levelEnded = true;
      autoScrolling = false;
      timerStarted = false;
      gameplayEnabled = false;
      hitSequenceRunning = false;

      targetWrap.classList.remove("show");
      nextLevelBtn.classList.remove("show");
      hitOverlay.classList.remove("show", "glitching", "glitch-out");
      instructionText.classList.remove("show");
      instructionText2.classList.remove("show");

      await runEndSequence(WIN_SEQUENCE, WIN_BUTTONS);
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        fireLasers();
      }
    });

    loadLevel(currentLevel);
    timerEl.textContent = formatTime(timeRemaining);
    requestAnimationFrame(tick);
    runIntroSequence();
  </script>
</body>
