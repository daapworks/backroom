<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Head Lasers Scroll Scene</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      /* we "fake scroll" inside a container */
      background: #0b0b0f;
      color: white;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* A scroll container so we can control scrollTop ourselves */
    #scroll {
      position: fixed;
      inset: 0;
      overflow: hidden;
      /* no native scrolling */
    }

    #world {
      position: relative;
      height: 4000px;
      /* make it "scrollable" */
      width: 100%;
    }

    /* Optional: subtle moving background to sell "scrolling" */
    .stars {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, .12), transparent 35%),
        radial-gradient(circle at 60% 70%, rgba(255, 255, 255, .10), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, .08), transparent 35%);
      filter: blur(0.2px);
      opacity: 0.8;
      pointer-events: none;
    }

    /* Head follows cursor (overlay, not part of scrolling world) */
    #head {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: auto;
      user-select: none;
      pointer-events: none;
      will-change: transform;
      filter: drop-shadow(0 14px 30px rgba(0, 0, 0, 0.55));
    }

    /* Target appears later */
    #targetWrap {
      position: fixed;
      left: 50%;
      top: 50%;
      /* the point in the world where it appears */
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      gap: 12px;
      opacity: 0;
      transition: opacity 400ms ease;
    }

    #targetWrap.show {
      opacity: 1;
    }

    #target {
      width: 240px;
      height: auto;
      filter: drop-shadow(0 12px 30px rgba(0, 0, 0, 0.6));
    }

    .hint {
      font-size: 14px;
      opacity: 0.8;
    }

    /* Lasers are simple divs we position + rotate */
    .laser {
      position: fixed;
      height: 4px;
      background: linear-gradient(90deg, rgba(255, 0, 70, 0), rgba(255, 0, 70, 1), rgba(255, 0, 70, 0));
      box-shadow: 0 0 10px rgba(255, 0, 70, 0.9), 0 0 22px rgba(255, 0, 70, 0.55);
      transform-origin: 0 50%;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      transition: opacity 80ms linear;
    }

    .laser.on {
      opacity: 1;
    }

    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 60;
    }

    .spark {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      background: white;
      box-shadow:
        0 0 6px rgba(255, 255, 255, 0.95),
        0 0 14px rgba(255, 120, 80, 0.85),
        0 0 24px rgba(255, 60, 0, 0.65);
      will-change: transform, opacity;
    }

    /* Popup */
    #popup {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: rgba(20, 20, 28, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 18px 18px;
      width: min(520px, calc(100vw - 40px));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
      z-index: 100;
    }

    #popup.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    #popup h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    #popup p {
      margin: 0;
      opacity: 0.85;
      line-height: 1.35;
    }

    #popup button {
      margin-top: 12px;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      cursor: pointer;
    }

    #popup button:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    /* Small debug line */
    #status {
      position: fixed;
      left: 12px;
      bottom: 10px;
      font-size: 12px;
      opacity: 0.6;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="scroll">
    <div id="world">
      <div class="stars"></div>

      <!-- Some filler content to sell the scroll -->
      <div style="position:absolute; left:50%; top:220px; transform:translateX(-50%); text-align:center; opacity:.8;">
        <div style="font-size:44px; letter-spacing:0.5px;">Move the mouse to control Putin</div>
        <div style="margin-top:8px; font-size:14px; opacity:.7;">
        </div>
      </div>

      <div style="position:absolute; left:50%; top:1200px; transform:translateX(-50%); opacity:.55;">
        <div style="font-size:22px;"></div>
      </div>

      <!-- Target section -->

    </div>
  </div>
  <div id="targetWrap">
    <img id="target" src="assets/img/AlexanderLitvinenko-Lasered 1.png" alt="target" />
  </div>

  <!-- Head overlay -->
  <!-- <img id="head" src="assets/img/face-helmet-japanese-svgrepo-com.svg" alt="head" /> -->
  <img id="head" src="assets/img/putin-face-slab.png" alt="head" />

  <!-- Lasers -->
  <div id="laserL" class="laser"></div>
  <div id="laserR" class="laser"></div>
  <div id="particles"></div>

  <!-- Popup -->
  <div id="popup" role="dialog" aria-modal="true">
    <h3>Hit confirmed ✅</h3>
    <p>Putin text yadadadadadad</p>
    <button id="closePopup">Close</button>
  </div>

  <div id="status"></div>

  <script>
    // ------- Scene settings -------
    const STOP_AT_SCROLL_Y = 2400;    // when auto scroll reaches here, it "stops"
    const TARGET_REVEAL_Y = 2200;     // when to show target (around the stop)
    const AUTO_SCROLL_SPEED = 600;   // px per frame-ish (tweak)

    // ------- Elements -------
    const world = document.getElementById("world");
    const head = document.getElementById("head");
    const targetWrap = document.getElementById("targetWrap");
    const target = document.getElementById("target");
    const laserL = document.getElementById("laserL");
    const laserR = document.getElementById("laserR");
    const particles = document.getElementById("particles");
    const popup = document.getElementById("popup");
    const closePopup = document.getElementById("closePopup");
    const status = document.getElementById("status");

    // ------- State -------
    let scrollY = 0;
    let autoScrolling = false;
    let scrollStarted = false;

    // Cursor-follow (smoothed)
    let cursorX = window.innerWidth / 2;
    let cursorY = window.innerHeight / 2;
    let headX = window.innerWidth / 2;
    let headY = window.innerHeight / 2;

    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;

    let targetVX = 120;  // horizontal speed
    let targetVY = 90; // vertical speed

    let lastTime = performance.now();

    // // If head is "pinned" at stop point
    // let headPinned = false;
    // let pinnedX = window.innerWidth / 2;
    // let pinnedY = window.innerHeight / 2;

    // Utility
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    window.addEventListener("pointermove", (e) => {
      cursorX = e.clientX;
      cursorY = e.clientY;

      if (!scrollStarted) {
        autoScrolling = true;
        scrollStarted = true;
      }
    });

    // Close popup
    closePopup.addEventListener("click", () => popup.classList.remove("show"));
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") popup.classList.remove("show");
    });

    function tick(now) {
      const delta = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;

      // Auto-scroll until STOP_AT_SCROLL_Y
      if (autoScrolling) {
        scrollY += AUTO_SCROLL_SPEED * delta;
        if (scrollY >= STOP_AT_SCROLL_Y) {
          scrollY = STOP_AT_SCROLL_Y;
          autoScrolling = false;
        }
      }

      if (scrollY >= TARGET_REVEAL_Y) {
        targetWrap.classList.add("show");
      }

      world.style.transform = `translateY(${-scrollY}px)`;

      // Smooth mouse follow
      const followSpeed = 8;
      headX += (cursorX - headX) * followSpeed * delta;
      headY += (cursorY - headY) * followSpeed * delta;

      const headRect = head.getBoundingClientRect();
      const padX = headRect.width / 2;
      const padY = headRect.height / 2;

      headX = clamp(headX, padX, window.innerWidth - padX);
      headY = clamp(headY, padY, window.innerHeight - padY);

      head.style.left = `${headX - padX}px`;
      head.style.top = `${headY - padY}px`;

      // Target movement
      if (targetWrap.classList.contains("show")) {
        const rect = targetWrap.getBoundingClientRect();
        const halfW = rect.width / 2;
        const halfH = rect.height / 2;

        targetX += targetVX * delta;
        targetY += targetVY * delta;

        if (targetX < halfW) {
          targetX = halfW;
          targetVX *= -1;
        } else if (targetX > window.innerWidth - halfW) {
          targetX = window.innerWidth - halfW;
          targetVX *= -1;
        }

        if (targetY < halfH) {
          targetY = halfH;
          targetVY *= -1;
        } else if (targetY > window.innerHeight - halfH) {
          targetY = window.innerHeight - halfH;
          targetVY *= -1;
        }

        targetVX += (Math.random() - 0.5) * 20 * delta;
        targetVY += (Math.random() - 0.5) * 20 * delta;

        const TARGET_MAX_SPEED = 180;
        targetVX = Math.max(-TARGET_MAX_SPEED, Math.min(TARGET_MAX_SPEED, targetVX));
        targetVY = Math.max(-TARGET_MAX_SPEED, Math.min(TARGET_MAX_SPEED, targetVY));

        targetWrap.style.left = `${targetX}px`;
        targetWrap.style.top = `${targetY}px`;
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);

    function fireLasers() {
      if (!targetWrap.classList.contains("show")) return;

      const headRect = head.getBoundingClientRect();

      const eyeY = headRect.top + headRect.height * 0.42;
      const eyeLX = headRect.left + headRect.width * 0.36;
      const eyeRX = headRect.left + headRect.width * 0.64;

      // Fixed direction: straight right
      const laserLength = window.innerWidth;
      const aimXLeft = eyeLX + laserLength;
      const aimXRight = eyeRX + laserLength;
      const aimY = eyeY;

      const targetRect = target.getBoundingClientRect();

      animateLaser(laserL, eyeLX, eyeY, aimXLeft, aimY, targetRect);
      animateLaser(laserR, eyeRX, eyeY, aimXRight, aimY, targetRect);

      const hitPointL = getRayRectHitPoint(eyeLX, eyeY, aimXLeft, aimY, targetRect);
      const hitPointR = getRayRectHitPoint(eyeRX, eyeY, aimXRight, aimY, targetRect);

      if (hitPointL || hitPointR) {
        const impact = hitPointL || hitPointR;

        setTimeout(() => {
          spawnImpactSparks(impact.x, impact.y);
          popup.classList.add("show");
        }, 220);
      }
    }



    function animateLaser(el, x1, y1, x2, y2, targetRect) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const fullLen = Math.hypot(dx, dy);
      const angle = Math.atan2(dy, dx) * (180 / Math.PI);

      // Check for intersection
      const tHit = rayRectIntersection(x1, y1, x2, y2, targetRect);

      // If hit, shorten the beam
      const finalLen = tHit !== null ? fullLen * tHit : fullLen;

      const duration = 220;
      const start = performance.now();

      el.style.left = `${x1}px`;
      el.style.top = `${y1}px`;
      el.style.width = `0px`;
      el.style.transform = `rotate(${angle}deg)`;
      el.classList.add("on");

      function frame(now) {
        const t = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);

        el.style.width = `${finalLen * eased}px`;

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          setTimeout(() => {
            el.classList.remove("on");
            el.style.width = `0px`;
          }, 120);
        }
      }

      requestAnimationFrame(frame);

      return tHit !== null;
    }

    function drawLaser(el, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len = Math.hypot(dx, dy);
      const angle = Math.atan2(dy, dx) * (180 / Math.PI);

      el.style.left = `${x1}px`;
      el.style.top = `${y1}px`;
      el.style.width = `${len}px`;
      el.style.transform = `rotate(${angle}deg)`;
    }

    function spawnImpactSparks(x, y) {
      const count = 18;

      for (let i = 0; i < count; i++) {
        const spark = document.createElement("div");
        spark.className = "spark";
        particles.appendChild(spark);

        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        const distance = 30 + Math.random() * 50;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;

        const size = 3 + Math.random() * 5;
        const duration = 250 + Math.random() * 250;

        spark.style.width = `${size}px`;
        spark.style.height = `${size}px`;
        spark.style.left = `${x - size / 2}px`;
        spark.style.top = `${y - size / 2}px`;
        spark.style.opacity = "1";
        spark.style.transform = "translate(0px, 0px) scale(1)";

        spark.animate(
          [
            {
              transform: "translate(0px, 0px) scale(1)",
              opacity: 1
            },
            {
              transform: `translate(${dx}px, ${dy}px) scale(0.3)`,
              opacity: 0
            }
          ],
          {
            duration,
            easing: "cubic-bezier(0.2, 0.8, 0.2, 1)",
            fill: "forwards"
          }
        );

        setTimeout(() => spark.remove(), duration);
      }
    }

    function pointInRect(x, y, rect) {
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    // Simple segment-rectangle intersection: check if segment crosses any rect edge or starts/ends inside.
    function segmentIntersectsRect(x1, y1, x2, y2, r) {
      if (pointInRect(x1, y1, r) || pointInRect(x2, y2, r)) return true;

      // Rect corners
      const A = { x: r.left, y: r.top };
      const B = { x: r.right, y: r.top };
      const C = { x: r.right, y: r.bottom };
      const D = { x: r.left, y: r.bottom };

      return (
        segIntersects(x1, y1, x2, y2, A.x, A.y, B.x, B.y) ||
        segIntersects(x1, y1, x2, y2, B.x, B.y, C.x, C.y) ||
        segIntersects(x1, y1, x2, y2, C.x, C.y, D.x, D.y) ||
        segIntersects(x1, y1, x2, y2, D.x, D.y, A.x, A.y)
      );
    }

    function segIntersects(x1, y1, x2, y2, x3, y3, x4, y4) {
      // 2D segment intersection using orientation tests
      const o1 = orient(x1, y1, x2, y2, x3, y3);
      const o2 = orient(x1, y1, x2, y2, x4, y4);
      const o3 = orient(x3, y3, x4, y4, x1, y1);
      const o4 = orient(x3, y3, x4, y4, x2, y2);

      if (o1 !== o2 && o3 !== o4) return true;
      return false;
    }

    function orient(ax, ay, bx, by, cx, cy) {
      const v = (by - ay) * (cx - bx) - (bx - ax) * (cy - by);
      return v > 0 ? 1 : v < 0 ? -1 : 0;
    }

    // Spacebar to fire
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        fireLasers();
      }
    });

    function getRayRectHitPoint(x1, y1, x2, y2, rect) {
      const dx = x2 - x1;
      const dy = y2 - y1;

      let bestT = Infinity;
      let hitPoint = null;

      const sides = [
        [rect.left, rect.top, rect.right, rect.top],
        [rect.right, rect.top, rect.right, rect.bottom],
        [rect.right, rect.bottom, rect.left, rect.bottom],
        [rect.left, rect.bottom, rect.left, rect.top],
      ];

      for (const [x3, y3, x4, y4] of sides) {
        const denom = dx * (y4 - y3) - dy * (x4 - x3);
        if (denom === 0) continue;

        const t = ((x3 - x1) * (y4 - y3) - (y3 - y1) * (x4 - x3)) / denom;
        const u = ((x3 - x1) * dy - (y3 - y1) * dx) / denom;

        if (t >= 0 && t <= 1 && u >= 0 && u <= 1 && t < bestT) {
          bestT = t;
          hitPoint = {
            x: x1 + dx * t,
            y: y1 + dy * t
          };
        }
      }

      return hitPoint;
    }

    function rayRectIntersection(x1, y1, x2, y2, rect) {
      const dx = x2 - x1;
      const dy = y2 - y1;

      let tMin = Infinity;

      // Check intersection with each side of the rectangle
      const sides = [
        // top
        [rect.left, rect.top, rect.right, rect.top],
        // right
        [rect.right, rect.top, rect.right, rect.bottom],
        // bottom
        [rect.right, rect.bottom, rect.left, rect.bottom],
        // left
        [rect.left, rect.bottom, rect.left, rect.top],
      ];

      for (const [x3, y3, x4, y4] of sides) {
        const denom = (dx * (y4 - y3) - dy * (x4 - x3));
        if (denom === 0) continue;

        const t = ((x3 - x1) * (y4 - y3) - (y3 - y1) * (x4 - x3)) / denom;
        const u = ((x3 - x1) * dy - (y3 - y1) * dx) / denom;

        if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
          tMin = Math.min(tMin, t);
        }
      }

      return tMin < Infinity ? tMin : null;
    }

    // Optional: click to resume scrolling (debug / alternate flow)
    // window.addEventListener("dblclick", () => { autoScrolling = true; headPinned = false; });
  </script>
</body>

</html>
